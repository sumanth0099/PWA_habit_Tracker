version: '3.8'

services:
  push-server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: habit-tracker-push-server
    ports:
      - '3001:3001'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
